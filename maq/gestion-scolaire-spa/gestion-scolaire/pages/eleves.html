<!-- ═══════════════════════════════════════════════════════════
     pages/eleves.html  —  Section Liste des élèves
     ═══════════════════════════════════════════════════════════ -->
<section class="content" id="section-eleves">

    <div class="dash-card">
        <div class="dash-card-head">
            <span class="dash-card-title"><i class="fas fa-users"></i> Liste des élèves</span>
            <div class="action-buttons">
                <button class="btn btn-success btn-sm" onclick="openEleveModal()">
                    <i class="fas fa-plus"></i> Ajouter un élève
                </button>
                <button class="btn btn-primary btn-sm" onclick="exportEleves()">
                    <i class="fas fa-download"></i> Exporter
                </button>
            </div>
        </div>

        <div class="dash-card-body">

            <!-- Stats élèves -->
            <div class="eleves-stats" id="elevesStatsContainer"></div>

            <!-- Filtres -->
            <div class="eleves-filters">
                <div class="search-box-eleve">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control" id="searchEleve"
                           placeholder="Rechercher par nom, matricule, classe..."
                           oninput="filterEleves()">
                </div>
                <select class="form-control" id="filterClasse" onchange="filterEleves()" style="max-width:160px;">
                    <option value="">Toutes les classes</option>
                </select>
                <div class="btn-group-eleve">
                    <button class="btn btn-sm" id="btnAll"      onclick="filterByStatut('all')"      style="background:var(--primary);color:white;">Tous</button>
                    <button class="btn btn-sm" id="btnActif"    onclick="filterByStatut('actif')"    style="background:#e9ecef;">Actifs</button>
                    <button class="btn btn-sm" id="btnInactif"  onclick="filterByStatut('inactif')"  style="background:#e9ecef;">Inactifs</button>
                    <button class="btn btn-sm" id="btnSuspendu" onclick="filterByStatut('suspendu')" style="background:#e9ecef;">Suspendus</button>
                </div>
            </div>

            <!-- Tableau -->
            <div style="overflow-x:auto;">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Matricule</th>
                            <th>Nom</th>
                            <th>Classe</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="elevesTableBody"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:15px;flex-wrap:wrap;gap:10px;">
                <span id="elevesPaginationInfo" style="color:#6c757d;font-size:13px;"></span>
                <div class="action-buttons">
                    <button class="btn btn-sm btn-secondary" id="elevesPrevBtn" onclick="previousElevesPage()" disabled>
                        <i class="fas fa-chevron-left"></i> Précédent
                    </button>
                    <button class="btn btn-sm btn-secondary" id="elevesNextBtn" onclick="nextElevesPage()">
                        Suivant <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

</section>
