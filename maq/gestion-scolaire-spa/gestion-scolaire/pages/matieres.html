<!-- ═══════════════════════════════════════════════════════════
     pages/matieres.html  —  Section Matières enseignées
     ═══════════════════════════════════════════════════════════ -->
<section class="content" id="section-matieres">

    <div class="dash-card">
        <div class="dash-card-head">
            <span class="dash-card-title"><i class="fas fa-book"></i> Matières enseignées</span>
            <div class="action-buttons">
                <button class="btn btn-success btn-sm" onclick="openAddMatiereModal()">
                    <i class="fas fa-plus"></i> Ajouter une matière
                </button>
                <button class="btn btn-primary btn-sm" onclick="exportMatieres()">
                    <i class="fas fa-download"></i> Exporter
                </button>
            </div>
        </div>

        <div class="dash-card-body">

            <!-- Stats -->
            <div class="absence-stats" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:20px;" id="matieresStatsContainer"></div>

            <!-- Tableau -->
            <div style="overflow-x:auto;">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Matière</th>
                            <th>Enseignant</th>
                            <th>Coefficient</th>
                            <th>Heures/sem.</th>
                            <th>Niveau</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="matieresTableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

</section>

<script>
(function initMatieresPage() {
    /* Stats */
    const statsContainer = document.getElementById('matieresStatsContainer');
    const enseignants = [...new Set(matieresData.map(m => m.enseignant))].length;
    const coeffMax = matieresData.length ? Math.max(...matieresData.map(m => m.coefficient)) : 0;
    statsContainer.innerHTML = `
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-book" style="color:var(--terra);"></i></div><div class="stat-value">${matieresData.length}</div><div class="stat-label">Total matières</div></div>
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-chalkboard-teacher" style="color:var(--primary);"></i></div><div class="stat-value">${enseignants}</div><div class="stat-label">Enseignants</div></div>
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-star" style="color:var(--warning);"></i></div><div class="stat-value">${coeffMax}</div><div class="stat-label">Coeff. max</div></div>`;

    /* Tableau */
    const tbody = document.getElementById('matieresTableBody');
    if (!matieresData.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center p-3">Aucune matière enregistrée.</td></tr>';
        return;
    }
    tbody.innerHTML = matieresData.map(m => `
        <tr>
            <td><strong><i class="fas fa-book-open" style="color:var(--terra);margin-right:6px;"></i>${m.nom}</strong></td>
            <td>${m.enseignant}</td>
            <td><span class="badge badge-success">Coeff. ${m.coefficient}</span></td>
            <td>${m.heures || 3}h</td>
            <td>${m.niveau || 'Tous niveaux'}</td>
            <td class="action-buttons">
                <button class="btn-small btn-primary" onclick="editMatiereItem('${m.nom}')"><i class="fas fa-edit"></i></button>
                <button class="btn-small btn-danger"  onclick="deleteMatiereItem('${m.nom}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`).join('');
})();
</script>
