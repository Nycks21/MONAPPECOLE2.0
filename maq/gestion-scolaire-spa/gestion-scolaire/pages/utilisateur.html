<!-- ═══════════════════════════════════════════════════════════
     pages/utilisateur.html  —  Section Gestion des utilisateurs
     ═══════════════════════════════════════════════════════════ -->
<section class="content" id="section-utilisateur">

    <div class="dash-card">
        <div class="dash-card-head">
            <span class="dash-card-title"><i class="fas fa-users-cog"></i> Gestion des utilisateurs</span>
            <div class="action-buttons">
                <button class="btn btn-success btn-sm" onclick="openAddUserModal()">
                    <i class="fas fa-plus"></i> Ajouter un utilisateur
                </button>
                <button class="btn btn-primary btn-sm" onclick="exportUsers()">
                    <i class="fas fa-download"></i> Exporter
                </button>
            </div>
        </div>

        <div class="dash-card-body">

            <!-- Stats -->
            <div class="absence-stats" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:20px;" id="usersStatsContainer"></div>

            <!-- Tableau -->
            <div style="overflow-x:auto;">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Téléphone</th>
                            <th>Dernière connexion</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

</section>

<script>
(function initUtilisateurPage() {
    /* Stats */
    const statsContainer = document.getElementById('usersStatsContainer');
    const actifs   = usersData.filter(u => u.statut === 'Actif').length;
    const inactifs = usersData.filter(u => u.statut !== 'Actif').length;
    statsContainer.innerHTML = `
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-users" style="color:var(--primary);"></i></div><div class="stat-value">${usersData.length}</div><div class="stat-label">Total utilisateurs</div></div>
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-user-check" style="color:var(--success);"></i></div><div class="stat-value">${actifs}</div><div class="stat-label">Actifs</div></div>
        <div class="absence-card"><div class="stat-icon"><i class="fas fa-user-lock" style="color:var(--danger);"></i></div><div class="stat-value">${inactifs}</div><div class="stat-label">Inactifs</div></div>`;

    /* Tableau */
    const tbody = document.getElementById('usersTableBody');
    if (!usersData.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center p-3">Aucun utilisateur enregistré.</td></tr>';
        return;
    }
    tbody.innerHTML = usersData.map(u => `
        <tr>
            <td>
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="avatar-eleve" style="width:32px;height:32px;font-size:13px;">${u.nom.charAt(0)}</div>
                    <strong>${u.nom}</strong>
                </div>
            </td>
            <td>${u.email}</td>
            <td><span class="badge ${u.role === 'Administrateur' ? 'badge-danger' : u.role === 'Professeur' ? 'badge-success' : 'badge-warning'}">${u.role}</span></td>
            <td>${u.telephone || '—'}</td>
            <td>${u.derniereConnexion || '—'}</td>
            <td><span class="badge ${u.statut === 'Actif' ? 'badge-success' : 'badge-warning'}">${u.statut}</span></td>
            <td class="action-buttons">
                <button class="btn-small btn-primary" onclick="editUserItem('${u.email}')"><i class="fas fa-edit"></i></button>
                <button class="btn-small btn-danger"  onclick="deleteUserItem('${u.email}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`).join('');
})();
</script>
