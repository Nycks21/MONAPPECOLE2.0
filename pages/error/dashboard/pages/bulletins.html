<!-- ═══════════════════════════════════════════════════════════
     pages/bulletins.html  —  Section Bulletins de notes
     ═══════════════════════════════════════════════════════════ -->
<section class="content" id="section-bulletins">

    <div class="dash-card">
        <div class="dash-card-head">
            <span class="dash-card-title"><i class="fas fa-file-alt"></i> Bulletins de notes</span>
            <div class="action-buttons">
                <button class="btn btn-success btn-sm" onclick="openAddBulletinModal()">
                    <i class="fas fa-plus"></i> + Bulletin
                </button>
                <div class="file-input-wrapper">
                    <button class="btn btn-info btn-sm"><i class="fas fa-file-excel"></i> Importer Excel</button>
                    <input type="file" id="excelImport" accept=".xlsx,.xls,.csv" onchange="importExcel(this)">
                </div>
                <button class="btn btn-primary btn-sm" onclick="exportBulletins()">
                    <i class="fas fa-download"></i> Exporter
                </button>
            </div>
        </div>

        <div class="dash-card-body">
            <div style="overflow-x:auto;">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Matricule</th>
                            <th>Élève</th>
                            <th>Classe</th>
                            <th>Matière</th>
                            <th>Enseignant</th>
                            <th>Note</th>
                            <th>Coeff</th>
                            <th>Période</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bulletinsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</section>

<script>
(function initBulletinsPage() {
    const tbody = document.getElementById('bulletinsTableBody');
    if (!tbody) return;
    if (!bulletinsData || bulletinsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center p-3">Aucun bulletin enregistré. Cliquez sur "+ Bulletin" pour ajouter.</td></tr>';
        return;
    }
    tbody.innerHTML = bulletinsData.map(b => {
        const eleve = elevesData.find(e => e.matricule === b.eleveMatricule);
        return `
        <tr>
            <td><strong>${b.eleveMatricule}</strong></td>
            <td>${b.eleveNom}</td>
            <td>${eleve ? eleve.classe : '—'}</td>
            <td><i class="fas fa-book-open" style="color:var(--terra);margin-right:4px;"></i>${b.matiere}</td>
            <td>${b.enseignant}</td>
            <td><strong>${b.note}/20</strong></td>
            <td>${b.coefficient}</td>
            <td>${b.periode}</td>
            <td class="action-buttons">
                <button class="btn-small btn-primary" onclick="editBulletin('${b.eleveMatricule}','${b.matiere}')"><i class="fas fa-edit"></i></button>
                <button class="btn-small btn-danger"  onclick="deleteBulletin('${b.eleveMatricule}','${b.matiere}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
})();
</script>
